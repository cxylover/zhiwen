<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
  .container { width: 100%; max-width: 560px; }
  h1 { text-align: center; color: #1a1a2e; margin-bottom: 24px; font-size: 28px; }
  .input-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .input-bar input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s; }
  .input-bar input:focus { border-color: #4361ee; }
  .input-bar button { padding: 12px 20px; background: #4361ee; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; white-space: nowrap; transition: background .2s; }
  .input-bar button:hover { background: #3a56d4; }
  .filters { display: flex; gap: 6px; margin-bottom: 16px; }
  .filters button { padding: 6px 16px; border: 1.5px solid #d0d0d0; background: #fff; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all .2s; }
  .filters button.active { background: #4361ee; color: #fff; border-color: #4361ee; }
  .stats { font-size: 13px; color: #888; margin-bottom: 12px; padding-left: 4px; }
  .todo-list { list-style: none; }
  .todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #fff; border-radius: 10px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: box-shadow .2s, opacity .3s; }
  .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }
  .todo-item input[type=checkbox] { width: 20px; height: 20px; accent-color: #4361ee; cursor: pointer; flex-shrink: 0; }
  .todo-text { flex: 1; font-size: 15px; color: #333; word-break: break-word; }
  .todo-item .delete-btn { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 0 4px; transition: color .2s; }
  .todo-item .delete-btn:hover { color: #e74c3c; }
  .empty { text-align: center; color: #bbb; padding: 40px 0; font-size: 15px; }
</style>
</head>
<body>
<div class="container">
  <h1>待办事项</h1>
  <div class="input-bar">
    <input id="todoInput" type="text" placeholder="输入待办事项..." autofocus>
    <button onclick="addTodo()">添加</button>
  </div>
  <div class="filters">
    <button class="active" data-filter="all" onclick="setFilter('all',this)">全部</button>
    <button data-filter="active" onclick="setFilter('active',this)">未完成</button>
    <button data-filter="done" onclick="setFilter('done',this)">已完成</button>
  </div>
  <div class="stats" id="stats"></div>
  <ul class="todo-list" id="todoList"></ul>
</div>
<script>
const STORAGE_KEY = 'zhiguang_todos';
let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let filter = 'all';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

function render() {
  const list = document.getElementById('todoList');
  const filtered = todos.filter(t => filter === 'all' ? true : filter === 'active' ? !t.done : t.done);
  const activeCount = todos.filter(t => !t.done).length;
  document.getElementById('stats').textContent = todos.length ? `${activeCount} 项未完成 / 共 ${todos.length} 项` : '';
  if (!filtered.length) { list.innerHTML = `<li class="empty">${todos.length ? '没有匹配的待办' : '暂无待办，添加一条试试'}</li>`; return; }
  list.innerHTML = filtered.map(t => `
    <li class="todo-item${t.done ? ' done' : ''}" data-id="${t.id}">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}')">
      <span class="todo-text">${esc(t.text)}</span>
      <button class="delete-btn" onclick="remove('${t.id}')">&times;</button>
    </li>`).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), text, done: false });
  input.value = '';
  save(); render();
}

function toggle(id) { const t = todos.find(t => t.id === id); if (t) t.done = !t.done; save(); render(); }
function remove(id) { todos = todos.filter(t => t.id !== id); save(); render(); }
function setFilter(f, btn) { filter = f; document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }

document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
render();
</script>
</body>
</html>
